name: check-spec

on:
  pull_request:
    branches: [main]

jobs:
  check-spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if spec.md exists
        run: |
          if [ -f spec.md ]; then
            echo "spec.md must be removed before merging."
            exit 1
          fi
